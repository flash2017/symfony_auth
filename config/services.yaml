# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    App\Infrastructure\Api\Controller\:
        resource: '../src/Infrastructure/Api/Controller'
        tags: ['controller.service_arguments']

    # Инфраструктура (реализации)
    App\Infrastructure\:
        resource: '../src/Infrastructure/'
        exclude: '../src/Infrastructure/Api/Controller/'

    # Автовайрим Хендлеры и Команды
    App\Application\:
        resource: '../src/Application/'

    # Домен (интерфейсы)
    App\Domain\:
        resource: '../src/Domain'

    App\Domain\User\Repository\UserRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\UserRepository'
    App\Domain\Auth\Port\PasswordHasherInterface: '@App\Infrastructure\Security\SymfonyPasswordHasher'

    # 1. Стандартный процессор для интерполяции сообщения ({id} -> 123)
    Monolog\Processor\PsrLogMessageProcessor:
        tags:
             - { name: monolog.processor, handler: api_json }

    #2. Стандартный процессор для данных запроса (URI, IP, Method)
    Monolog\Processor\WebProcessor:
        tags:
            - { name: monolog.processor, handler: api_json }

    # 3. Мой кастомный процессор для статуса ответа
    App\Infrastructure\Logger\Monolog\Processor\ApiResponseProcessor:
        arguments:
            - '@request_stack'
        tags:
            # Регистрируем как процессор логов
            - { name: monolog.processor, handler: api_json }
            # Регистрируем как слушатель события (указываем метод)
            - { name: kernel.event_listener, event: kernel.terminate, method: terminate }

    App\Infrastructure\EventListener\OnRequestListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request }
        calls:
            - [ setLogger, [ '@monolog.logger.api' ] ]

    App\Infrastructure\EventListener\OnResponseListener:
        tags:
            - { name: kernel.event_listener, event: kernel.response }
        calls:
            - [ setLogger, [ '@monolog.logger.api' ] ]

    # Параметры для JWT
    #App\Infrastructure\Security\LcobucciJwtProvider:
     #   arguments:
      #      $secretKey: '%env(JWT_SECRET_KEY)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    #App\:
    #    resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
